# UR5 Node parameters
ur5_node:
  ros__parameters:
    # Set to false when launched from full_pipeline.launch.py (no stdin).
    # Set to true when running standalone in a terminal for manual approval.
    require_confirmation: false

    # MoveIt2 planning parameters
    allowed_planning_time: 5.0
    num_planning_attempts: 5
    max_velocity_scaling_factor: 0.1
    max_acceleration_scaling_factor: 0.1
