# YOLO Detection Node parameters
yolo_detection_node:
  ros__parameters:
    # Path to your trained YOLOv11 segmentation model
    # Example: "/home/user/models/weed_best.pt"
    model_path: ""  # Override via launch arg: model_path:=/path/to/model.pt

    # Minimum confidence to accept a detection (0.0 - 1.0)
    confidence_threshold: 0.7

    # Process every Nth frame (1 = every frame, 5 = every 5th)
    # Recommended for CPU: 5-10
    process_every_n_frames: 4

    # Input topic (should match your RealSense color topic)
    input_image_topic: "/camera/camera/color/image_raw"
