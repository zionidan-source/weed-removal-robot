# Coordinator Node parameters
coordinator_node:
  ros__parameters:
    # TF frame names — run "ros2 run tf2_tools view_frames" to find yours
    robot_base_frame: "base_link"
    camera_frame: "camera_color_optical_frame"

    # UR5 reach limit (meters) — points beyond this are held in queue
    max_reach_m: 0.85

    # Valid depth range (meters) — reject readings outside this
    min_depth_m: 0.1
    max_depth_m: 1.5

    # If two detections are closer than this (meters), treat as duplicate
    duplicate_distance_m: 0.03

    # Radius (pixels) around centroid to sample depth values
    depth_sample_radius_px: 5
